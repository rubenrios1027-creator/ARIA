<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ARIA — AI Model Lab</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      border-bottom: 1px solid #2a2a3a;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #13141f;
    }

    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #7c6af7;
      letter-spacing: .03em;
    }

    .logo span { color: #a89af7; font-weight: 400; }

    .model-select-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .model-select-wrap label {
      font-size: 13px;
      color: #888;
    }

    select {
      background: #1e1f2e;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: #7c6af7; }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
    }

    .status-dot.offline { background: #f44336; }

    #chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 12px;
      max-width: 820px;
    }

    .message.user { flex-direction: row-reverse; align-self: flex-end; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #7c6af7; color: #fff; }
    .message.aria .avatar { background: #1e2a3a; color: #7c6af7; border: 1px solid #2a3a4a; }

    .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 680px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .bubble {
      background: #7c6af7;
      color: #fff;
      border-radius: 12px 4px 12px 12px;
    }

    .message.aria .bubble {
      background: #1a1b2e;
      border: 1px solid #2a2a3a;
      border-radius: 4px 12px 12px 12px;
    }

    .message.aria.error .bubble {
      background: #2a1a1a;
      border-color: #5a2a2a;
      color: #f88;
    }

    .typing .bubble::after {
      content: "▋";
      animation: blink .7s infinite;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .meta {
      font-size: 11px;
      color: #555;
      margin-top: 4px;
      padding: 0 4px;
    }

    .message.user .meta { text-align: right; }

    footer {
      padding: 16px 24px;
      border-top: 1px solid #2a2a3a;
      background: #13141f;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #user-input {
      flex: 1;
      background: #1e1f2e;
      border: 1px solid #2a2a3a;
      color: #e0e0e0;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      line-height: 1.5;
      font-family: inherit;
    }

    #user-input:focus { border-color: #7c6af7; }

    #send-btn {
      background: #7c6af7;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    #send-btn:hover { background: #6a58e0; }
    #send-btn:disabled { background: #333; color: #666; cursor: not-allowed; }

    .clear-btn {
      background: none;
      border: 1px solid #2a2a3a;
      color: #666;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 13px;
      cursor: pointer;
      transition: border-color .15s;
    }

    .clear-btn:hover { border-color: #555; color: #aaa; }

    .welcome {
      text-align: center;
      padding: 60px 20px;
      color: #444;
    }

    .welcome h2 { font-size: 22px; color: #7c6af7; margin-bottom: 10px; }
    .welcome p { font-size: 14px; line-height: 1.7; max-width: 480px; margin: 0 auto; }

    #model-status {
      font-size: 12px;
      color: #555;
      margin-left: 8px;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a3a; border-radius: 3px; }
  </style>
</head>
<body>

<header>
  <div class="logo">ARIA <span>AI Model Lab</span></div>
  <div class="status-dot" id="status-dot"></div>
  <span id="model-status">checking...</span>
  <div class="model-select-wrap">
    <label>Model</label>
    <select id="model-select">
      <option value="smollm2">smollm2</option>
      <option value="mistral" selected>mistral</option>
      <option value="sorc/qwen3.5-claude-4.6-opus-q4">qwen3.5-claude (red team)</option>
    </select>
  </div>
</header>

<div id="chat-window">
  <div class="welcome" id="welcome">
    <h2>ARIA is ready</h2>
    <p>Adaptive Readiness &amp; Instruction Assistant. Ask anything — your conversation is logged for red team analysis.</p>
  </div>
</div>

<footer>
  <div class="input-row">
    <textarea id="user-input" rows="1" placeholder="Ask ARIA something..."></textarea>
    <button class="clear-btn" onclick="clearChat()">Clear</button>
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</footer>

<script>
  const chatWindow = document.getElementById('chat-window');
  const userInput  = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const modelSel   = document.getElementById('model-select');
  const statusDot  = document.getElementById('status-dot');
  const modelStatus = document.getElementById('model-status');

  let history = [];

  const SYSTEM_PROMPT = `You are ARIA, a friendly and patient AI learning assistant built by Ruben Rios as part of the ARIA AI Model Lab project. You explain things clearly using simple language and real-world examples. You ask one follow-up question after each explanation to check understanding. Keep answers concise — 3 to 5 sentences unless asked for more detail.`;

  async function checkStatus() {
    try {
      const r = await fetch('/api/models');
      const d = await r.json();
      if (d.models && d.models.length > 0) {
        statusDot.classList.remove('offline');
        modelStatus.textContent = `${d.models.length} model(s) available`;
        modelSel.innerHTML = '';
        d.models.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.name;
          opt.textContent = m.name;
          if (m.name.includes('mistral')) opt.selected = true;
          modelSel.appendChild(opt);
        });
      }
    } catch {
      statusDot.classList.add('offline');
      modelStatus.textContent = 'Ollama offline';
    }
  }

  function addMessage(role, text, isError) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const wrap = document.createElement('div');
    wrap.className = `message ${role}${isError ? ' error' : ''}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? 'RR' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = role === 'user' ? 'You' : `ARIA · ${modelSel.value}`;

    wrap.appendChild(avatar);
    const inner = document.createElement('div');
    inner.appendChild(bubble);
    inner.appendChild(meta);
    wrap.appendChild(inner);

    chatWindow.appendChild(wrap);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return bubble;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    userInput.value = '';
    userInput.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);

    history.push({ role: 'user', content: text });

    const ariaBubble = addMessage('aria', '');
    ariaBubble.parentElement.parentElement.classList.add('typing');

    try {
      const messages = [
        { role: 'system', content: SYSTEM_PROMPT },
        ...history
      ];

      const r = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: modelSel.value, messages })
      });

      const d = await r.json();

      if (d.error) throw new Error(d.error);

      const reply = d.message?.content || d.response || 'No response.';
      ariaBubble.textContent = reply;
      ariaBubble.parentElement.parentElement.classList.remove('typing');
      history.push({ role: 'assistant', content: reply });

    } catch (e) {
      ariaBubble.textContent = `Error: ${e.message}`;
      ariaBubble.parentElement.parentElement.classList.remove('typing');
      ariaBubble.parentElement.parentElement.classList.add('error');
      history.pop();
    }

    sendBtn.disabled = false;
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  function clearChat() {
    history = [];
    chatWindow.innerHTML = '<div class="welcome" id="welcome"><h2>ARIA is ready</h2><p>Conversation cleared. Start a new session.</p></div>';
  }

  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 120) + 'px';
  });

  checkStatus();
  setInterval(checkStatus, 30000);
</script>
</body>
</html>
